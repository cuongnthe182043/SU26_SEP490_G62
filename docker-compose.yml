services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: SEP490
    volumes:
      - db_data:/var/lib/postgresql/data
      - './DB script:/docker-entrypoint-initdb.d'
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d SEP490" ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9999:9999"
    env_file:
      - ./backend/.env
    environment:
      # Override để trỏ vào service db nội bộ, không dùng localhost
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: SEP490
      DB_USER: postgres
      DB_PASSWORD: "root"
      DB_SSL: "false"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:9999
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
